<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Game Dev</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; }
#ui {
  position: absolute; top: 10px; left: 10px;
  color: #eee; font-size: 14px; text-shadow: 1px 1px 2px #000;
}
#title-screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #1a1a2e; color: #eee; z-index: 10;
}
#title-screen h1 { font-size: 48px; color: #e94560; margin-bottom: 8px; }
#title-screen .sub { font-size: 16px; color: #999; margin-bottom: 32px; }
#title-screen .start-btn {
  padding: 12px 40px; font-size: 20px;
  background: #e94560; color: #fff; border: none; border-radius: 8px;
  cursor: pointer; transition: transform 0.1s;
}
#title-screen .start-btn:hover { transform: scale(1.05); }
#devlog-info {
  position: absolute; bottom: 10px; left: 10px;
  color: #666; font-size: 12px;
}
</style>
</head>
<body>

<div id="title-screen">
  <h1>DODGE!</h1>
  <div class="sub">- Day 1: Core Movement & Dodge -</div>
  <button class="start-btn" onclick="startGame()">START</button>
</div>

<canvas id="game"></canvas>
<div id="ui">
  <div id="score">SCORE: 0</div>
  <div id="hp">HP: ███████████████</div>
</div>
<div id="devlog-info">Daily Game Dev - v0.0.1</div>

<script>
// === Canvas Setup ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// === Game State ===
let gameRunning = false;
let score = 0;
let hp = 100;
let gameOver = false;

// Player
const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 16,
  speed: 4,
  color: '#00d2ff',
  trail: [],
};

// Input
const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// Touch support
let touchTarget = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchTarget = { x: t.clientX, y: t.clientY };
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchTarget = { x: t.clientX, y: t.clientY };
});
canvas.addEventListener('touchend', () => touchTarget = null);

// Enemies
let enemies = [];
let spawnTimer = 0;
const spawnInterval = 40; // frames

function spawnEnemy() {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if (side === 0) { x = Math.random() * canvas.width; y = -20; }
  else if (side === 1) { x = canvas.width + 20; y = Math.random() * canvas.height; }
  else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + 20; }
  else { x = -20; y = Math.random() * canvas.height; }

  const angle = Math.atan2(player.y - y, player.x - x);
  const speed = 2 + Math.random() * 2 + score / 500;
  enemies.push({
    x, y, size: 8 + Math.random() * 8,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    color: `hsl(${Math.random() * 60 + 340}, 80%, 55%)`,
  });
}

// Particles
let particles = [];
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: 2 + Math.random() * 3,
    });
  }
}

// === Update ===
function update() {
  if (gameOver) return;

  // Player movement
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['a']) dx -= 1;
  if (keys['ArrowRight'] || keys['d']) dx += 1;
  if (keys['ArrowUp'] || keys['w']) dy -= 1;
  if (keys['ArrowDown'] || keys['s']) dy += 1;

  if (touchTarget) {
    const tdx = touchTarget.x - player.x;
    const tdy = touchTarget.y - player.y;
    const dist = Math.sqrt(tdx * tdx + tdy * tdy);
    if (dist > 8) {
      dx = tdx / dist;
      dy = tdy / dist;
    }
  }

  if (dx !== 0 || dy !== 0) {
    const len = Math.sqrt(dx * dx + dy * dy);
    player.x += (dx / len) * player.speed;
    player.y += (dy / len) * player.speed;
  }

  // Clamp to screen
  player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
  player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

  // Trail
  player.trail.push({ x: player.x, y: player.y, life: 15 });
  if (player.trail.length > 20) player.trail.shift();
  player.trail.forEach(t => t.life--);

  // Spawn enemies
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnEnemy();
    spawnTimer = 0;
  }

  // Update enemies
  enemies.forEach(e => {
    e.x += e.vx;
    e.y += e.vy;
  });

  // Collision
  enemies = enemies.filter(e => {
    const dx = e.x - player.x;
    const dy = e.y - player.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < player.size + e.size) {
      hp -= 10;
      spawnParticles(e.x, e.y, '#e94560', 8);
      if (hp <= 0) {
        hp = 0;
        gameOver = true;
        spawnParticles(player.x, player.y, '#00d2ff', 30);
      }
      return false;
    }
    return true;
  });

  // Remove off-screen enemies
  enemies = enemies.filter(e =>
    e.x > -50 && e.x < canvas.width + 50 &&
    e.y > -50 && e.y < canvas.height + 50
  );

  // Update particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.vx *= 0.96;
    p.vy *= 0.96;
  });
  particles = particles.filter(p => p.life > 0);

  // Score
  score++;

  // UI
  document.getElementById('score').textContent = `SCORE: ${score}`;
  const bars = Math.max(0, Math.floor(hp / 100 * 15));
  document.getElementById('hp').textContent = `HP: ${'█'.repeat(bars)}${'░'.repeat(15 - bars)}`;
}

// === Draw ===
function draw() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Trail
  player.trail.forEach(t => {
    const alpha = t.life / 15 * 0.3;
    ctx.fillStyle = `rgba(0, 210, 255, ${alpha})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, player.size * (t.life / 15), 0, Math.PI * 2);
    ctx.fill();
  });

  // Player
  if (!gameOver) {
    ctx.fillStyle = player.color;
    ctx.shadowColor = player.color;
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Enemies
  enemies.forEach(e => {
    ctx.fillStyle = e.color;
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba').replace('hsl', 'hsla');
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Game Over
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 48px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
    ctx.fillStyle = '#eee';
    ctx.font = '24px "Segoe UI", sans-serif';
    ctx.fillText(`SCORE: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
    ctx.font = '16px "Segoe UI", sans-serif';
    ctx.fillStyle = '#999';
    ctx.fillText('Click or Tap to Restart', canvas.width / 2, canvas.height / 2 + 60);
    ctx.textAlign = 'start';
  }
}

// === Game Loop ===
function loop() {
  if (!gameRunning) { requestAnimationFrame(loop); return; }
  update();
  draw();
  requestAnimationFrame(loop);
}

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  gameRunning = true;
  resetGame();
}

function resetGame() {
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
  player.trail = [];
  enemies = [];
  particles = [];
  score = 0;
  hp = 100;
  gameOver = false;
  spawnTimer = 0;
}

// Restart on click/tap when game over
canvas.addEventListener('click', () => {
  if (gameOver) resetGame();
});

loop();
</script>
</body>
</html>
