<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily HTML5 Games</title>
<style>
  body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #1a1a2e; color: #eee; }
  h1 { color: #e94560; }
  .game-list { list-style: none; padding: 0; }
  .game-list li { margin: 8px 0; }
  .game-list a { color: #0f3460; background: #e94560; padding: 8px 16px; border-radius: 4px; text-decoration: none; display: inline-block; }
  .game-list a:hover { background: #c73652; }
</style>
</head>
<body>
<h1>🎮 Daily HTML5 Games</h1>
<p>AIが毎日1つHTML5ゲームを生成します。</p>
<ul class="game-list" id="list">
</ul>
<script>
// ゲーム一覧はgames/index.jsonから動的に読み込む
fetch('games/index.json').then(r => r.json()).then(games => {
  const list = document.getElementById('list');
  games.reverse().forEach(g => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="games/${g.date}.html">🕹️ ${g.date} - ${g.theme}</a>`;
    list.appendChild(li);
  });
}).catch(() => {
  document.getElementById('list').innerHTML = '<li>まだゲームがありません</li>';
});
</script>
</body>
</html>
