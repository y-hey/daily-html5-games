<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法使いゲーム - 2026-04-11</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif; /* 外部ライブラリ不使用のため基本フォント */
            color: #eee;
            overflow: hidden;
            user-select: none; /* テキスト選択を無効化 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            touch-action: manipulation; /* スマホでのタッチ操作を最適化 */
        }
        canvas {
            background-color: #333;
            display: block;
            border: 2px solid #555;
            max-width: 90vw; /* 画面幅の90% */
            max-height: 90vh; /* 画面高さの90% */
            touch-action: none; /* Canvas上でのデフォルトのタッチ操作（スクロール/ズーム）を無効化 */
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            text-align: center;
            z-index: 100;
        }
        #gameOverScreen h1 {
            margin-bottom: 20px;
            color: #f00;
            text-shadow: 2px 2px 5px #800;
        }
        #gameOverScreen p {
            margin-bottom: 30px;
            font-size: 0.8em;
        }
        #gameOverScreen button {
            padding: 15px 30px;
            font-size: 0.6em;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #gameOverScreen button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="gameOverScreen" style="display:none;">
        <h1>GAME OVER</h1>
        <p>スコア: <span id="finalScore">0</span></p>
        <button id="restartButton">もう一度</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId;

        // ゲーム状態
        let isGameOver = false;
        let score = 0;
        let lastFrameTime = 0;
        let deltaTime = 0;

        // プレイヤー
        const player = {
            x: 0, // resizeCanvasで設定
            y: 0, // resizeCanvasで設定
            radius: 15,
            color: 'skyblue',
            draw: function() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 魔法使いの帽子
                ctx.beginPath();
                ctx.moveTo(this.x - this.radius, this.y - this.radius * 0.8);
                ctx.lineTo(this.x + this.radius, this.y - this.radius * 0.8);
                ctx.lineTo(this.x, this.y - this.radius * 2.5);
                ctx.closePath();
                ctx.fillStyle = '#8A2BE2'; // 青紫
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        };

        // キャンバスサイズを動的に設定し、プレイヤー位置を調整
        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth * 0.9, 500); // 最大幅500px
            canvas.height = Math.min(window.innerHeight * 0.9, 700); // 最大高700px

            player.x = canvas.width / 2;
            player.y = canvas.height - player.radius - 20; // 下から20pxの位置
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // 初期ロード時にも呼び出す

        // 敵（魔法弾）
        let enemies = [];
        const ENEMY_MIN_RADIUS = 8;
        const ENEMY_MAX_RADIUS = 15;
        const ENEMY_MIN_SPEED = 100; // px/sec
        const ENEMY_MAX_SPEED = 300; // px/sec
        let enemySpawnInterval = 1000; // ms
        let lastEnemySpawnTime = 0;

        function createEnemy() {
            const radius = Math.random() * (ENEMY_MAX_RADIUS - ENEMY_MIN_RADIUS) + ENEMY_MIN_RADIUS;
            const x = Math.random() * (canvas.width - radius * 2) + radius;
            const y = -radius; // 画面外から出現
            const speed = Math.random() * (ENEMY_MAX_SPEED - ENEMY_MIN_SPEED) + ENEMY_MIN_SPEED;
            const color = `hsl(${Math.random() * 360}, 70%, 50%)`; // カラフルな魔法弾
            enemies.push({ x, y, radius, speed, color });
        }

        function drawEnemy(enemy) {
            ctx.beginPath();
            ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
            ctx.fillStyle = enemy.color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // 衝突判定 (円と円)
        function checkCollision(obj1, obj2) {
            const dx = obj1.x - obj2.x;
            const dy = obj1.y - obj2.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < obj1.radius + obj2.radius;
        }

        // ゲームオーバー処理
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreSpan = document.getElementById('finalScore');
        const restartButton = document.getElementById('restartButton');

        function gameOver() {
            isGameOver = true;
            cancelAnimationFrame(animationFrameId);
            finalScoreSpan.textContent = Math.floor(score);
            gameOverScreen.style.display = 'flex';
        }

        function restartGame() {
            isGameOver = false;
            score = 0;
            enemies = [];
            enemySpawnInterval = 1000;
            lastEnemySpawnTime = 0;
            player.x = canvas.width / 2; // プレイヤー位置をリセット
            gameOverScreen.style.display = 'none';
            lastFrameTime = performance.now(); // タイマーをリセット
            gameLoop(lastFrameTime); // ゲームを再開
        }
        restartButton.addEventListener('click', restartGame);

        // プレイヤー移動処理 (マウス・タッチ対応)
        let isDragging = false;
        let touchStartX = 0;
        let playerStartX = 0;

        function getEventX(event) {
            if (event.touches && event.touches.length > 0) {
                return event.touches[0].clientX;
            }
            return event.clientX;
        }

        // マウスイベント
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            touchStartX = getEventX(e);
            playerStartX = player.x;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging || isGameOver) return;
            const currentX = getEventX(e);
            const deltaX = currentX - touchStartX;
            player.x = playerStartX + deltaX;

            // プレイヤーがキャンバス内にとどまるように制限
            if (player.x < player.radius) {
                player.x = player.radius;
            }
            if (player.x > canvas.width - player.radius) {
                player.x = canvas.width - player.radius;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false; // マウスがキャンバス外に出たらドラッグ解除
        });

        // タッチイベント
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // スクロールを防ぐ
            isDragging = true;
            touchStartX = getEventX(e);
            playerStartX = player.x;
        }, { passive: false }); // passive: false で preventDefault() を有効にする

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); // スクロールを防ぐ
            if (!isDragging || isGameOver) return;
            const currentX = getEventX(e);
            const deltaX = currentX - touchStartX;
            player.x = playerStartX + deltaX;

            // プレイヤーがキャンバス内にとどまるように制限
            if (player.x < player.radius) {
                player.x = player.radius;
            }
            if (player.x > canvas.width - player.radius) {
                player.x = canvas.width - player.radius;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        // ゲームループ
        function gameLoop(currentTime) {
            if (isGameOver) return;

            // deltaTime を計算 (秒単位)
            deltaTime = (currentTime - lastFrameTime) / 1000;
            lastFrameTime = currentTime;

            // 背景クリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#333';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // スコア更新
            score += deltaTime * 100; // 1秒あたり100点
            ctx.fillStyle = 'white';
            ctx.font = '20px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(`スコア: ${Math.floor(score)}`, 10, 30);

            // 敵の生成
            if (currentTime - lastEnemySpawnTime > enemySpawnInterval) {
                createEnemy();
                lastEnemySpawnTime = currentTime;
                // 時間経過で敵の出現頻度を上げる (最小500ms)
                enemySpawnInterval = Math.max(500, enemySpawnInterval * 0.98);
            }

            // 敵の更新と描画
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.y += enemy.speed * deltaTime;
                drawEnemy(enemy);

                // 衝突判定
                if (checkCollision(player, enemy)) {
                    gameOver();
                    return; // ゲームオーバーになったらループを抜ける
                }

                // 画面下部に到達した敵を削除
                if (enemy.y - enemy.radius > canvas.height) {
                    enemies.splice(i, 1);
                }
            }

            // プレイヤーの描画
            player.draw();

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // ゲーム開始
        lastFrameTime = performance.now();
        gameLoop(lastFrameTime);
    </script>
</body>
</html>
