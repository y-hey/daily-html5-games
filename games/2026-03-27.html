<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忍者ゲーム - 2026-03-27</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* スクロールバーが表示されないようにする */
            background-color: #000; /* 背景色（キャンバスが読み込まれるまで） */
        }
        canvas {
            display: block; /* キャンバスの下の余白を削除 */
            touch-action: none; /* スマホでのデフォルトのタッチ操作（スクロール、ピンチズームなど）を無効化 */
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameRunning = false;
        let gameOver = false;
        let score = 0;
        let lastFrameTime = 0;
        let shurikenSpawnInterval = 1000; // 手裏剣の生成間隔 (ms)
        let lastShurikenSpawnTime = 0;

        // プレイヤー設定
        const player = {
            x: 0,
            y: 0,
            width: 40,
            height: 60,
            speed: 200, // プレイヤーの移動速度 (pixels/second)
            movingLeft: false,
            movingRight: false
        };

        // 手裏剣設定
        let shurikens = [];
        const SHURIKEN_SIZE = 20;
        const SHURIKEN_SPEED_MIN = 150; // 手裏剣の最低速度 (pixels/second)
        const SHURIKEN_SPEED_MAX = 400; // 手裏剣の最高速度 (pixels/second)

        // ゲーム設定
        const SCORE_PER_SECOND = 10; // 1秒あたりのスコア増加量
        const GAME_DIFFICULTY_FACTOR = 0.995; // 難易度上昇係数 (Spawn Interval, Player Speed, Shuriken Speed)

        // キャンバスサイズをウィンドウに合わせる
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // プレイヤー位置を再調整
            player.x = (canvas.width / 2) - (player.width / 2);
            player.y = canvas.height - player.height - 20; // 画面下部に配置
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // 初期呼び出し

        // 描画関数

        function drawPlayer() {
            ctx.fillStyle = '#333'; // 忍者の胴体色
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // 簡単な忍者の頭部
            ctx.beginPath();
            ctx.arc(player.x + player.width / 2, player.y + player.height / 4, player.width / 4, 0, Math.PI * 2);
            ctx.fillStyle = '#666'; // 頭の色
            ctx.fill();
            ctx.strokeStyle = '#333'; // バンダナ色
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        function drawShuriken(shuriken) {
            ctx.fillStyle = '#999'; // 手裏剣の色
            ctx.beginPath();
            ctx.arc(shuriken.x, shuriken.y, shuriken.size / 2, 0, Math.PI * 2);
            ctx.fill();
            // 十字の刃
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(shuriken.x - shuriken.size / 2, shuriken.y);
            ctx.lineTo(shuriken.x + shuriken.size / 2, shuriken.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(shuriken.x, shuriken.y - shuriken.size / 2);
            ctx.lineTo(shuriken.x, shuriken.y + shuriken.size / 2);
            ctx.stroke();
        }

        function drawScore() {
            ctx.fillStyle = 'white';
            ctx.font = '24px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('スコア: ' + Math.floor(score), 10, 30);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; // 半透明の黒
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('ゲームオーバー', canvas.width / 2, canvas.height / 2 - 40);
            ctx.font = '32px Arial';
            ctx.fillText('スコア: ' + Math.floor(score), canvas.width / 2, canvas.height / 2 + 10);
            ctx.font = '24px Arial';
            ctx.fillText('画面をタップまたはクリックでリスタート', canvas.width / 2, canvas.height / 2 + 60);
        }

        // 更新関数

        function updatePlayer(deltaTime) {
            const dx = player.speed * (deltaTime / 1000); // 1フレームでの移動量
            if (player.movingLeft) {
                player.x -= dx;
            }
            if (player.movingRight) {
                player.x += dx;
            }

            // 画面端の境界チェック
            if (player.x < 0) {
                player.x = 0;
            }
            if (player.x + player.width > canvas.width) {
                player.x = canvas.width - player.width;
            }
        }

        function createShuriken() {
            const x = Math.random() * (canvas.width - SHURIKEN_SIZE); // ランダムなX座標
            const speed = SHURIKEN_SPEED_MIN + Math.random() * (SHURIKEN_SPEED_MAX - SHURIKEN_SPEED_MIN); // ランダムな速度
            shurikens.push({
                x: x,
                y: -SHURIKEN_SIZE, // キャンバスの上から生成
                size: SHURIKEN_SIZE,
                speed: speed
            });
        }

        function updateShurikens(deltaTime) {
            for (let i = shurikens.length - 1; i >= 0; i--) {
                const shuriken = shurikens[i];
                shuriken.y += shuriken.speed * (deltaTime / 1000);

                // 画面外に出た手裏剣を削除
                if (shuriken.y > canvas.height + shuriken.size) {
                    shurikens.splice(i, 1);
                }
            }
        }

        function checkCollisions() {
            for (let i = 0; i < shurikens.length; i++) {
                const shuriken = shurikens[i];

                // プレイヤーと手裏剣の簡易的な衝突判定 (AABB)
                if (player.x < shuriken.x + shuriken.size / 2 &&
                    player.x + player.width > shuriken.x - shuriken.size / 2 &&
                    player.y < shuriken.y + shuriken.size / 2 &&
                    player.y + player.height > shuriken.y - shuriken.size / 2) {
                    gameOver = true;
                    gameRunning = false;
                    break;
                }
            }
        }

        // ゲームループ
        function gameLoop(currentTime) {
            if (!gameRunning && !gameOver) {
                // 初回呼び出し時、ゲーム開始
                gameRunning = true;
                lastFrameTime = currentTime;
                lastShurikenSpawnTime = currentTime;
            }

            if (gameOver) {
                drawGameOver();
                return;
            }

            const deltaTime = currentTime - lastFrameTime;
            lastFrameTime = currentTime;

            // キャンバスをクリアし、背景を描画
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0a1d30'; // 暗い青の背景
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ゲーム状態の更新
            updatePlayer(deltaTime);
            updateShurikens(deltaTime);
            checkCollisions();

            // 新しい手裏剣を生成
            if (currentTime - lastShurikenSpawnTime > shurikenSpawnInterval) {
                createShuriken();
                lastShurikenSpawnTime = currentTime;

                // 難易度を徐々に上げる
                if (shurikenSpawnInterval > 100) { // 最小生成間隔を設定
                    shurikenSpawnInterval *= GAME_DIFFICULTY_FACTOR;
                }
                player.speed *= (2 - GAME_DIFFICULTY_FACTOR); // プレイヤー速度も少し上げる
                for(let shuriken of shurikens) { // 既存の手裏剣速度も上げる
                    shuriken.speed *= (2 - GAME_DIFFICULTY_FACTOR);
                }
            }

            // スコアを更新
            score += (SCORE_PER_SECOND * deltaTime / 1000);

            // 全て描画
            drawPlayer();
            shurikens.forEach(drawShuriken);
            drawScore();

            requestAnimationFrame(gameLoop);
        }

        // 入力処理

        function handleKeyDown(event) {
            if (event.key === 'ArrowLeft' || event.key === 'a') {
                player.movingLeft = true;
            } else if (event.key === 'ArrowRight' || event.key === 'd') {
                player.movingRight = true;
            }
        }

        function handleKeyUp(event) {
            if (event.key === 'ArrowLeft' || event.key === 'a') {
                player.movingLeft = false;
            } else if (event.key === 'ArrowRight' || event.key === 'd') {
                player.movingRight = false;
            }
        }

        function handleTouchStart(event) {
            if (gameOver) {
                restartGame();
                return;
            }
            event.preventDefault(); // デフォルトのタッチアクションを防止
            const touchX = event.touches[0].clientX;
            if (touchX < canvas.width / 2) {
                player.movingLeft = true;
                player.movingRight = false;
            } else {
                player.movingRight = true;
                player.movingLeft = false;
            }
        }

        function handleTouchMove(event) {
            event.preventDefault(); // デフォルトのタッチアクションを防止
            const currentTouchX = event.touches[0].clientX;
            if (currentTouchX < canvas.width / 2) {
                player.movingLeft = true;
                player.movingRight = false;
            } else {
                player.movingRight = true;
                player.movingLeft = false;
            }
        }

        function handleTouchEnd(event) {
            player.movingLeft = false;
            player.movingRight = false;
        }

        function handleClick(event) {
            if (gameOver) {
                restartGame();
            }
        }

        // ゲームのリスタート
        function restartGame() {
            // プレイヤー位置をリセット
            player.x = (canvas.width / 2) - (player.width / 2);
            player.y = canvas.height - player.height - 20;
            player.movingLeft = false;
            player.movingRight = false;
            player.speed = 200; // プレイヤー速度をリセット

            shurikens = []; // 手裏剣を全てクリア
            score = 0; // スコアをリセット
            gameOver = false;
            gameRunning = true; // ゲームを再開

            shurikenSpawnInterval = 1000; // 手裏剣の生成間隔をリセット
            lastShurikenSpawnTime = lastFrameTime; // スポーンタイマーをリセット

            requestAnimationFrame(gameLoop); // ゲームループを再開
        }

        // イベントリスナーを設定
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        canvas.addEventListener('touchstart', handleTouchStart);
        canvas.addEventListener('touchmove', handleTouchMove);
        canvas.addEventListener('touchend', handleTouchEnd);
        canvas.addEventListener('mousedown', handleClick); // PCでのクリックによるリスタート

        // ゲームループを開始
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
